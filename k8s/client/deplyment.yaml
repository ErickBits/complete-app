apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  labels:
    app: front-end
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
    spec:
      containers:
        - name: front-end
          image:
          ports:
            - containerPort: 3000